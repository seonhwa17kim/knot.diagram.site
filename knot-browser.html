<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Knot Data Browser</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --line: #cfd5de;
      --line-strong: #8792a2;
      --text: #1c232d;
      --muted: #657185;
      --accent: #205b8f;
      --accent-soft: #e5f0fa;
      --good: #0f6f4f;
      --warn: #885700;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.45;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 20px 24px 18px;
    }

    header h1 {
      margin: 0 0 8px;
      font-size: 24px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .subtle {
      color: var(--muted);
      margin: 0;
    }

    main {
      padding: 18px 24px 28px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto auto auto auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }

    input,
    select,
    button {
      font: inherit;
    }

    input,
    select {
      height: 40px;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 0 10px;
      min-width: 0;
    }

    button {
      min-height: 32px;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
      padding: 5px 10px;
    }

    button:hover {
      background: var(--accent-soft);
      border-color: var(--accent);
    }

    .statusbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      color: var(--muted);
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      background: var(--panel);
    }

    table {
      width: 100%;
      min-width: 1320px;
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed;
    }

    col.col-index { width: 72px; }
    col.col-knot { width: 110px; }
    col.col-hyp { width: 64px; }
    col.col-volume { width: 230px; }
    col.col-count { width: 76px; }
    col.col-matrix { width: 430px; }
    col.col-repo { width: 175px; }
    col.col-new { width: 163px; }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 9px 10px;
      text-align: left;
      vertical-align: top;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #e8ecf1;
      border-bottom: 2px solid var(--line-strong);
      font-size: 13px;
      font-weight: 650;
      color: #26313f;
      white-space: nowrap;
    }

    tbody tr:nth-child(even) {
      background: #fbfcfd;
    }

    tbody tr:hover {
      background: #eef6ff;
    }

    .number {
      text-align: right;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .name-cell {
      white-space: nowrap;
      font-weight: 600;
    }

    .chip {
      display: inline-block;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 1px 7px;
      margin: 0 4px 4px 0;
      background: #fff;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .chip.geometric {
      border-color: var(--good);
      background: #e7f5ef;
      color: #084b34;
      font-weight: 700;
    }

    .chip.positive-dim {
      border-color: var(--warn);
      background: #fff4db;
      color: #6b4300;
      font-weight: 700;
    }

    .ideal-matrix {
      display: inline-grid;
      gap: 2px;
      color: #313b49;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      white-space: nowrap;
    }

    .matrix-row {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .matrix-label {
      min-width: 24px;
      color: var(--muted);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 12px;
      font-weight: 650;
    }

    .matrix-brace,
    .matrix-comma {
      color: var(--muted);
    }

    .matrix-row .chip {
      margin: 0;
      padding: 0 6px;
      min-width: 38px;
      text-align: center;
    }

    .links {
      white-space: nowrap;
    }

    .links a,
    .links button {
      margin-right: 6px;
      margin-bottom: 4px;
    }

    .links button {
      color: var(--accent);
      border-color: var(--line);
      background: #fff;
    }

    .volume {
      max-width: 210px;
      color: #313b49;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .muted {
      color: var(--muted);
    }

    .viewer {
      margin: 8px 0;
      border: 1px solid var(--line);
      background: var(--panel);
    }

    .viewer-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      flex-wrap: wrap;
    }

    .viewer-title {
      font-weight: 650;
    }

    .viewer-content {
      padding: 12px;
    }

    .viewer-tabs {
      display: flex;
      gap: 6px;
      border-bottom: 1px solid var(--line);
      margin: -12px -12px 12px;
      padding: 8px 12px 0;
      overflow-x: auto;
    }

    .viewer-tab {
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
      border-bottom-color: transparent;
      white-space: nowrap;
    }

    .viewer-tab[aria-selected="true"] {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: #113f68;
      font-weight: 650;
    }

    .viewer-panel[hidden] {
      display: none;
    }

    .viewer-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .viewer-fact {
      border: 1px solid var(--line);
      background: #fbfcfd;
      padding: 8px 10px;
    }

    .viewer-label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 2px;
    }

    .viewer-value {
      font-weight: 650;
      overflow-wrap: anywhere;
    }

    .viewer-section-title {
      margin: 14px 0 8px;
      font-size: 15px;
      font-weight: 650;
    }

    .summary-table {
      width: 100%;
      min-width: 0;
      border-collapse: collapse;
      border-spacing: 0;
      margin-bottom: 12px;
    }

    .summary-table th,
    .summary-table td {
      position: static;
      border: 1px solid var(--line);
      padding: 8px 10px;
      background: #fff;
      color: var(--text);
      font-size: 14px;
      text-align: left;
      vertical-align: top;
      white-space: normal;
    }

    .summary-table th {
      width: 180px;
      background: #f1f4f7;
      font-weight: 650;
    }

    .summary-table .volume {
      max-width: none;
    }

    .viewer-check {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 10px 0;
      color: var(--text);
      font-size: 14px;
    }

    .viewer-check input {
      height: auto;
      min-width: auto;
    }

    .viewer-notice {
      border: 1px solid var(--warn);
      background: #fff8e8;
      color: #5f3b00;
      padding: 8px 10px;
      margin: 10px 0;
      font-size: 14px;
    }

    .determinant-block[hidden] {
      display: none;
    }

    .viewer-list {
      display: grid;
      gap: 8px;
    }

    .ideal-card {
      border: 1px solid var(--line);
      background: #fff;
      padding: 10px;
    }

    .ideal-card.geometric {
      border-color: var(--good);
      background: #f4fbf8;
    }

    .ideal-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 8px;
      font-weight: 650;
    }

    .ideal-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .ideal-volume {
      margin-top: 8px;
      color: #313b49;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
    }

    .json-tree {
      max-height: 520px;
      overflow: auto;
      border: 1px solid var(--line);
      background: #fbfcfd;
      padding: 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
    }

    .json-tree details {
      margin-left: 14px;
    }

    .json-tree summary {
      cursor: pointer;
      color: #26313f;
    }

    .json-leaf {
      margin-left: 20px;
      overflow-wrap: anywhere;
    }

    .json-key {
      color: #184d7a;
      font-weight: 650;
    }

    .json-primitive {
      color: #5a3212;
    }

    pre {
      margin: 0;
      max-height: 520px;
      overflow: auto;
      padding: 14px;
      background: #111820;
      color: #e7eef7;
      font-size: 13px;
      line-height: 1.45;
      tab-size: 2;
    }

    .viewer-frame {
      display: block;
      width: 100%;
      height: 520px;
      border: 0;
      background: #fff;
    }

    .viewer-note {
      color: var(--muted);
      margin: 0 0 10px;
      font-size: 13px;
    }

    .empty {
      padding: 24px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 760px) {
      header,
      main {
        padding-left: 14px;
        padding-right: 14px;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="topline">
      <div>
        <h1>Knot Data Browser</h1>
        <p class="subtle">Boundary parabolic representation data for knots up to 13 crossings.</p>
      </div>
      <a href="./index.html">Back to original table</a>
    </div>
  </header>

  <main>
    <div class="toolbar">
      <input id="search" type="search" placeholder="Search by crossing, name, index, obstruction, or volume" autofocus>
      <select id="crossing-filter" aria-label="Crossing filter">
        <option value="">All crossings</option>
      </select>
      <select id="hyperbolic-filter" aria-label="Hyperbolicity filter">
        <option value="">All types</option>
        <option value="true">Hyperbolic</option>
        <option value="false">Non-hyperbolic</option>
      </select>
      <select id="dimension-filter" aria-label="Dimension filter">
        <option value="">All dimensions</option>
        <option value="positive">Has positive-dimensional ideal</option>
        <option value="zero">Zero-dimensional ideals only</option>
      </select>
      <select id="page-size" aria-label="Rows per page">
        <option value="50">50 rows</option>
        <option value="100" selected>100 rows</option>
        <option value="250">250 rows</option>
        <option value="100000">All rows</option>
      </select>
    </div>

    <div class="statusbar">
      <div id="result-count">Loading data...</div>
      <div>
        <button id="prev-page" type="button">Previous</button>
        <span id="page-label" class="muted"></span>
        <button id="next-page" type="button">Next</button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <colgroup>
          <col class="col-index">
          <col class="col-knot">
          <col class="col-hyp">
          <col class="col-volume">
          <col class="col-count">
          <col class="col-matrix">
          <col class="col-repo">
          <col class="col-new">
        </colgroup>
        <thead>
          <tr>
            <th>Index</th>
            <th>Knot</th>
            <th>Hyp.</th>
            <th>Geometric complex volume</th>
            <th># ideals</th>
            <th>Ideal matrix</th>
            <th>Repository data</th>
            <th>New JSON</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>

    <section class="viewer" id="viewer" hidden>
      <div class="viewer-head">
        <span class="viewer-title" id="viewer-title">JSON viewer</span>
        <button id="close-viewer" type="button">Close</button>
      </div>
      <div id="viewer-body">
        <pre id="json-output"></pre>
      </div>
    </section>
  </main>

  <script>
    const MANIFEST_URL = "parabolic/data/knot-browser-manifest.json";
    const R2_BASE_URL = "https://pub-1e0df66310b5459ab9a8bfd35e3a1505.r2.dev/";

    let records = [];
    let filtered = [];
    let page = 1;
    const jsonCache = new Map();

    const searchInput = document.getElementById("search");
    const crossingFilter = document.getElementById("crossing-filter");
    const hyperbolicFilter = document.getElementById("hyperbolic-filter");
    const dimensionFilter = document.getElementById("dimension-filter");
    const pageSizeSelect = document.getElementById("page-size");
    const resultCount = document.getElementById("result-count");
    const pageLabel = document.getElementById("page-label");
    const prevPage = document.getElementById("prev-page");
    const nextPage = document.getElementById("next-page");
    const tbody = document.getElementById("rows");
    const viewer = document.getElementById("viewer");
    const viewerTitle = document.getElementById("viewer-title");
    const viewerBody = document.getElementById("viewer-body");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function fileName(path) {
      return String(path || "").split("/").pop();
    }

    function r2Url(record) {
      const parts = String(record.newJsonKey || "").split("/");
      return R2_BASE_URL + parts.map(part => encodeURIComponent(part)).join("/");
    }

    function compactVolume(record) {
      if (!record.hyperbolic) {
        return '<span class="muted">-</span>';
      }

      const values = record.geometricVolume;
      if (!values || values.length === 0) {
        return '<span class="muted">none marked</span>';
      }
      const conjugatePair = formatConjugateVolumePair(values);
      if (conjugatePair) {
        return conjugatePair;
      }
      return values.map(value => formatComplexVolume(value)).join("<br>");
    }

    function stripPrecision(value) {
      return String(value).replace(/`\d+(?:\.\d+)?/g, "");
    }

    function shortNumber(value) {
      const rounded = Number(value).toFixed(4);
      return rounded.replace(/\.?0+$/, "");
    }

    function parseComplexParts(value) {
      const cleaned = stripPrecision(value).replace(/\s+/g, " ").trim();
      const match = cleaned.match(/^([+-]?\d+(?:\.\d+)?)(?:\s*([+-])\s*(\d+(?:\.\d+)?)\s*\*?\s*I)?$/);
      if (!match) {
        return null;
      }
      const real = Number(match[1]);
      const imaginary = match[2] ? Number(`${match[2]}${match[3]}`) : 0;
      if (!Number.isFinite(real) || !Number.isFinite(imaginary)) {
        return null;
      }
      return { real, imaginary };
    }

    function formatConjugateVolumePair(values) {
      if (!Array.isArray(values) || values.length !== 2) {
        return null;
      }
      const first = parseComplexParts(values[0]);
      const second = parseComplexParts(values[1]);
      if (!first || !second) {
        return null;
      }
      if (Math.abs(first.real - second.real) > 1e-6 || Math.abs(first.imaginary + second.imaginary) > 1e-6) {
        return null;
      }
      return `${escapeHtml(shortNumber(first.real))} &plusmn; ${escapeHtml(shortNumber(Math.abs(first.imaginary)))}&radic;&minus;1`;
    }

    function formatComplexVolume(value) {
      const formatted = stripPrecision(value)
        .replace(/\s*\*\s*I\b/g, "sqrt(-1)")
        .replace(/\bI\b/g, "sqrt(-1)")
        .replace(/-?\d+\.\d+/g, number => shortNumber(number));
      return escapeHtml(formatted).replaceAll("sqrt(-1)", "&radic;&minus;1");
    }

    function matrixChip(value, component, kind) {
      const classes = ["chip"];
      const isPositiveDimensional = kind === "solutions" && ((component && component.positiveDimensional) || (typeof value === "number" && value < 0));
      if (component && component.geometric) {
        classes.push("geometric");
      }
      if (isPositiveDimensional) {
        classes.push("positive-dim");
      }

      const title = isPositiveDimensional && component
        ? `ideal ${component.index}: positive-dimensional, dimension ${component.dimension}`
        : `ideal ${component ? component.index : "?"}`;
      return `<span class="${classes.join(" ")}" title="${escapeHtml(title)}">${escapeHtml(value ?? "?")}</span>`;
    }

    function matrixRow(label, cells) {
      return `
        <div class="matrix-row">
          <span class="matrix-label">${escapeHtml(label)}</span>
          <span class="matrix-brace">{</span>
          ${cells.join('<span class="matrix-comma">,</span>')}
          <span class="matrix-brace">}</span>
        </div>
      `;
    }

    function idealMatrix(record) {
      if (!record.components || record.components.length === 0) {
        return '<span class="muted">none</span>';
      }
      const solutions = record.components.map(component => (
        matrixChip(component.solutions ?? "?", component, "solutions")
      ));
      const obstructions = record.components.map((component, index) => (
        matrixChip(component.obstruction ?? record.obstructions?.[index] ?? "?", component, "obstructions")
      ));
      return `
        <div class="ideal-matrix" title="{{numbers of solutions}, {obstructions}}">
          ${matrixRow("N", solutions)}
          ${matrixRow("Ob", obstructions)}
        </div>
      `;
    }

    function repoLinks(record) {
      const links = [];
      if (record.html) {
        links.push(`<a href="${escapeHtml(record.html)}">html</a>`);
      }
      if (record.pdf) {
        links.push(`<a href="${escapeHtml(record.pdf)}" download>pdf</a>`);
      }
      links.push(`<a href="${escapeHtml(record.repoJson)}" download>json</a>`);
      links.push(`<button type="button" data-record-index="${record.index}" data-view-url="${escapeHtml(record.repoJson)}" data-view-title="${escapeHtml(record.name)} repository JSON" data-view-label="Repository">view</button>`);
      return links.join("");
    }

    function newJsonLinks(record) {
      const viewUrl = record.newJson || r2Url(record);
      const downloadUrl = record.newJson || r2Url(record);
      return [
        `<a href="${escapeHtml(downloadUrl)}" download="${escapeHtml(fileName(downloadUrl))}">json</a>`,
        `<button type="button" data-record-index="${record.index}" data-view-url="${escapeHtml(viewUrl)}" data-view-fallback-url="${escapeHtml(r2Url(record))}" data-view-title="${escapeHtml(record.name)} new JSON" data-view-label="New">view</button>`
      ].join("");
    }

    function searchableText(record) {
      return [
        record.index,
        record.name,
        record.rawName,
        record.crossing,
        record.hyperbolic,
        record.hasPositiveDimensionalIdeal,
        record.geometricVolume && record.geometricVolume.join(" "),
        record.solutionCounts && record.solutionCounts.join(" "),
        record.obstructions && record.obstructions.join(" ")
      ].join(" ").toLowerCase();
    }

    function matchesQuery(record, query) {
      if (!query) {
        return true;
      }

      if (/^\d+$/.test(query)) {
        const numeric = Number(query);
        if (numeric >= 3 && numeric <= 13) {
          return record.crossing === numeric;
        }
      }

      return searchableText(record).includes(query);
    }

    function applyFilters() {
      const query = searchInput.value.trim().toLowerCase();
      const crossing = crossingFilter.value;
      const hyperbolic = hyperbolicFilter.value;
      const dimension = dimensionFilter.value;

      filtered = records.filter(record => {
        if (crossing && String(record.crossing) !== crossing) {
          return false;
        }
        if (hyperbolic && String(record.hyperbolic) !== hyperbolic) {
          return false;
        }
        if (dimension === "positive" && !record.hasPositiveDimensionalIdeal) {
          return false;
        }
        if (dimension === "zero" && record.hasPositiveDimensionalIdeal) {
          return false;
        }
        return matchesQuery(record, query);
      });

      page = 1;
      render();
    }

    function render() {
      const pageSize = Number(pageSizeSelect.value);
      const pageCount = Math.max(1, Math.ceil(filtered.length / pageSize));
      page = Math.min(page, pageCount);
      const start = (page - 1) * pageSize;
      const visible = filtered.slice(start, start + pageSize);

      resultCount.textContent = `${filtered.length} of ${records.length} knots`;
      pageLabel.textContent = `Page ${page} / ${pageCount}`;
      prevPage.disabled = page <= 1;
      nextPage.disabled = page >= pageCount;

      if (visible.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8" class="empty">No knots match the current search.</td></tr>`;
        return;
      }

      tbody.innerHTML = visible.map(record => `
        <tr class="data-row">
          <td class="number">${record.index}</td>
          <td class="name-cell">${
            record.diagram
              ? `<a href="#none" onclick="return diagramPopup('${escapeHtml(record.diagram)}')">${escapeHtml(record.name)}</a>`
              : escapeHtml(record.name)
          }</td>
          <td>${record.hyperbolic ? "yes" : "no"}</td>
          <td class="volume">${compactVolume(record)}</td>
          <td class="number">${record.componentCount}</td>
          <td>${idealMatrix(record)}</td>
          <td class="links">${repoLinks(record)}</td>
          <td class="links">${newJsonLinks(record)}</td>
        </tr>
      `).join("");
    }

    function placeViewerNear(button) {
      const oldRow = document.getElementById("viewer-row");
      if (oldRow) {
        oldRow.remove();
      }

      const clickedRow = button.closest("tr");
      const row = document.createElement("tr");
      row.id = "viewer-row";
      const cell = document.createElement("td");
      cell.colSpan = 8;
      cell.appendChild(viewer);
      row.appendChild(cell);
      clickedRow.insertAdjacentElement("afterend", row);
      viewer.hidden = false;
    }

    function setViewerPre(text) {
      viewerBody.innerHTML = '<pre id="json-output"></pre>';
      viewerBody.querySelector("pre").textContent = text;
    }

    function setViewerFrame(url) {
      viewerBody.innerHTML = `<iframe class="viewer-frame" src="${escapeHtml(url)}"></iframe>`;
    }

    function recordByIndex(index) {
      return records.find(record => String(record.index) === String(index));
    }

    function asArray(value) {
      if (value === undefined || value === null) {
        return [];
      }
      if (Array.isArray(value)) {
        return value;
      }
      if (typeof value === "string") {
        const trimmed = value.trim();
        if (trimmed.startsWith("{") && trimmed.endsWith("}")) {
          const inner = trimmed.slice(1, -1).trim();
          return inner ? inner.split(",").map(item => item.trim()) : [];
        }
      }
      return [value];
    }

    function firstAvailable(...values) {
      return values.find(value => value !== undefined && value !== null);
    }

    function primaryIdealsFromReps(parabolicReps) {
      const reps = Array.isArray(parabolicReps)
        ? parabolicReps.filter(item => item && typeof item === "object")
        : (parabolicReps && typeof parabolicReps === "object" ? [parabolicReps] : []);

      const ideals = [];
      reps.forEach(rep => {
        if (Array.isArray(rep.PrimaryIdeals)) {
          ideals.push(...rep.PrimaryIdeals);
        }
        const comps = rep.Comps;
        if (comps && Array.isArray(comps.PrimaryIdeals)) {
          ideals.push(...comps.PrimaryIdeals);
        }
      });
      return ideals;
    }

    function primaryIdealsFromData(data) {
      const diagram = data && data.Diagram && typeof data.Diagram === "object" ? data.Diagram : {};
      return primaryIdealsFromReps(firstAvailable(data && data.ParabolicReps, diagram.ParabolicReps));
    }

    function parseGeometricIndices(value) {
      if (value === undefined || value === null || value === 0 || value === "0" || value === "{0}" || value === "") {
        return [];
      }
      if (typeof value === "number") {
        return value > 0 ? [value] : [];
      }
      if (Array.isArray(value)) {
        return value
          .map(item => Number(String(item).trim()))
          .filter(item => Number.isInteger(item) && item > 0);
      }
      return String(value)
        .replace(/^\{|\}$/g, "")
        .split(",")
        .map(item => Number(item.trim()))
        .filter(item => Number.isInteger(item) && item > 0);
    }

    function selectedComplexVolumes(value, indices) {
      const values = asArray(value);
      return indices
        .map(index => values[index - 1])
        .filter(item => item !== undefined && item !== null);
    }

    function componentSolutionCount(ideal) {
      if (!ideal || typeof ideal !== "object") {
        return "?";
      }
      const dimension = ideal.IdealDimension;
      if (ideal.IsZeroDim === false && Number.isInteger(dimension) && dimension > 0) {
        return -dimension;
      }
      if (Number.isInteger(dimension) && dimension > 0) {
        return -dimension;
      }
      const complexVolumes = asArray(ideal.ComplexVolumeN);
      if (complexVolumes.length) {
        return complexVolumes.length;
      }
      if (ideal.NumberOfSols !== undefined && ideal.NumberOfSols !== null) {
        return ideal.NumberOfSols;
      }
      return "?";
    }

    function isPositiveDimensionalIdeal(ideal) {
      return ideal && (ideal.IsZeroDim === false || (Number.isInteger(ideal.IdealDimension) && ideal.IdealDimension > 0));
    }

    function displayName(name) {
      const underscored = String(name || "").match(/^(\d+)([an])_(\d+)$/);
      if (underscored) {
        return `${underscored[1]}${underscored[2]}_${Number(underscored[3])}`;
      }
      const compact = String(name || "").match(/^(\d+)([an])(\d+)$/);
      if (compact) {
        return `${compact[1]}${compact[2]}_${Number(compact[3])}`;
      }
      return name;
    }

    function summarizeData(data, fallbackRecord) {
      const ideals = primaryIdealsFromData(data);
      const components = [];
      const obstructions = [];
      let geometricComponent = null;
      let geometricVolume = null;
      let hasPositiveDimensionalIdeal = false;

      ideals.forEach((ideal, index) => {
        const geometricIndices = parseGeometricIndices(ideal.GeometricComponent);
        const positiveDimensional = isPositiveDimensionalIdeal(ideal);
        const obstruction = ideal.Obstruction ?? "?";
        hasPositiveDimensionalIdeal = hasPositiveDimensionalIdeal || positiveDimensional;

        if (geometricIndices.length && geometricComponent === null) {
          geometricComponent = index + 1;
          geometricVolume = selectedComplexVolumes(ideal.ComplexVolumeN, geometricIndices).map(String);
        }

        obstructions.push(obstruction);
        components.push({
          index: index + 1,
          name: ideal.IdealName,
          solutions: componentSolutionCount(ideal),
          dimension: ideal.IdealDimension,
          positiveDimensional,
          obstruction,
          geometric: geometricIndices.length > 0,
          geometricIndices
        });
      });

      const rawName = data.Name || data.RolfsenName || fallbackRecord?.rawName || fallbackRecord?.name || "-";
      return {
        ...(fallbackRecord || {}),
        index: data.Index ?? fallbackRecord?.index,
        name: displayName(rawName),
        rawName,
        hyperbolic: data.Hyperbolic ?? fallbackRecord?.hyperbolic,
        determinant: fallbackRecord?.determinant ?? null,
        geometricComponent,
        geometricVolume,
        componentCount: ideals.length,
        hasPositiveDimensionalIdeal,
        solutionCounts: components.map(component => component.solutions),
        components,
        obstructions
      };
    }

    function numericValue(value) {
      if (typeof value === "number" && Number.isFinite(value)) {
        return value;
      }
      if (typeof value === "string" && /^-?\d+$/.test(value.trim())) {
        return Number(value.trim());
      }
      return null;
    }

    function obstructionValue(value) {
      if (value === 1 || value === "1" || value === "+1") {
        return 1;
      }
      if (value === -1 || value === "-1") {
        return -1;
      }
      return null;
    }

    function solutionStats(record) {
      let obstructionMinus = 0;
      let obstructionPlus = 0;

      (record.components || []).forEach(component => {
        const solutions = numericValue(component.solutions);
        const obstruction = obstructionValue(component.obstruction);
        if (solutions === null || solutions < 0) {
          return;
        }
        if (obstruction === -1) {
          obstructionMinus += solutions;
        } else if (obstruction === 1) {
          obstructionPlus += solutions;
        }
      });

      const difference = obstructionMinus - obstructionPlus;
      const determinant = numericValue(record.determinant);
      const determinantTarget = determinant === null ? null : (determinant - 1) / 2;
      return { obstructionMinus, obstructionPlus, difference, determinant, determinantTarget };
    }

    function solutionCountsEqual(left, right) {
      const leftValues = left || [];
      const rightValues = right || [];
      return leftValues.length === rightValues.length && leftValues.every((value, index) => String(value) === String(rightValues[index]));
    }

    function boolText(value) {
      if (value === true) {
        return "yes";
      }
      if (value === false) {
        return "no";
      }
      return "-";
    }

    function viewerFact(label, value) {
      return `
        <div class="viewer-fact">
          <span class="viewer-label">${escapeHtml(label)}</span>
          <span class="viewer-value">${escapeHtml(value ?? "-")}</span>
        </div>
      `;
    }

    function idealSummaryCard(ideal, index) {
      const geometricIndices = parseGeometricIndices(ideal.GeometricComponent);
      const geometricVolumes = selectedComplexVolumes(ideal.ComplexVolumeN, geometricIndices);
      const geometric = geometricIndices.length > 0;
      const obstruction = ideal.Obstruction ?? "-";
      const solutionCount = componentSolutionCount(ideal);
      const solutionClasses = ["chip"];
      if (typeof solutionCount === "number" && solutionCount < 0) {
        solutionClasses.push("positive-dim");
      }
      const chips = [
        `<span class="${solutionClasses.join(" ")}">solutions ${escapeHtml(solutionCount)}</span>`,
        `<span class="chip">dimension ${escapeHtml(ideal.IdealDimension ?? "-")}</span>`,
        `<span class="chip">obstruction ${escapeHtml(obstruction)}</span>`
      ];
      if (geometric) {
        chips.push(`<span class="chip geometric">geometric ${escapeHtml(geometricIndices.join(", "))}</span>`);
      }

      return `
        <div class="ideal-card${geometric ? " geometric" : ""}">
          <div class="ideal-head">
            <span>${escapeHtml(ideal.IdealName || `Ideal ${index}`)}</span>
            <span class="muted">#${index}</span>
          </div>
          <div class="ideal-meta">${chips.join("")}</div>
          ${
            geometricVolumes.length
              ? `<div class="ideal-volume">${geometricVolumes.map(value => formatComplexVolume(value)).join("<br>")}</div>`
              : ""
          }
        </div>
      `;
    }

    function manifestSummaryTable(record) {
      if (!record) {
        return "";
      }
      const volume = compactVolume(record);
      return `
        <table class="summary-table">
          <tbody>
            <tr><th>Index</th><td>${escapeHtml(record.index)}</td></tr>
            <tr><th>Knot</th><td>${escapeHtml(record.name)}</td></tr>
            <tr><th>Hyperbolic</th><td>${record.hyperbolic ? "yes" : "no"}</td></tr>
            <tr><th>Determinant</th><td>${escapeHtml(record.determinant ?? "-")}</td></tr>
            <tr><th>Geometric complex volume</th><td class="volume">${volume}</td></tr>
            <tr><th># ideals</th><td>${escapeHtml(record.componentCount)}</td></tr>
            <tr><th>Positive-dimensional ideal</th><td>${record.hasPositiveDimensionalIdeal ? "yes" : "no"}</td></tr>
            <tr><th>Ideal matrix</th><td>${idealMatrix(record)}</td></tr>
          </tbody>
        </table>
      `;
    }

    function determinantComparison(record) {
      const stats = solutionStats(record);
      const target = stats.determinantTarget;
      const status = target === null
        ? "-"
        : (stats.difference === target ? "match" : "different");
      return `
        <table class="summary-table">
          <tbody>
            <tr><th>det(K)</th><td>${escapeHtml(stats.determinant ?? "-")}</td></tr>
            <tr><th>(det(K)-1)/2</th><td>${escapeHtml(target ?? "-")}</td></tr>
            <tr><th>Solutions with obstruction -1</th><td>${escapeHtml(stats.obstructionMinus)}</td></tr>
            <tr><th>Solutions with obstruction +1</th><td>${escapeHtml(stats.obstructionPlus)}</td></tr>
            <tr><th>Difference</th><td>${escapeHtml(stats.difference)}</td></tr>
            <tr><th>Comparison</th><td>${escapeHtml(status)}</td></tr>
          </tbody>
        </table>
      `;
    }

    function solutionDifferenceNotice(viewRecord, manifestRecord, label) {
      if (!manifestRecord || label !== "Repository" || solutionCountsEqual(viewRecord.solutionCounts, manifestRecord.solutionCounts)) {
        return "";
      }
      return `
        <div class="viewer-notice">
          This repository JSON has solution counts ${escapeHtml(JSON.stringify(viewRecord.solutionCounts))};
          the new-data manifest has ${escapeHtml(JSON.stringify(manifestRecord.solutionCounts))}.
        </div>
      `;
    }

    function setEmbeddedViewer(url, record, label, message = "The JSON object is shown directly below the same manifest summary table.") {
      viewerBody.innerHTML = `
        <div class="viewer-content">
          ${manifestSummaryTable(record)}
          <div class="viewer-section-title">${escapeHtml(label)} JSON</div>
          <p class="viewer-note">${escapeHtml(message)}</p>
          <iframe class="viewer-frame" src="${escapeHtml(url)}"></iframe>
        </div>
      `;
    }

    function jsonTree(value, label = "root", depth = 0) {
      const key = `<span class="json-key">${escapeHtml(label)}</span>`;
      if (value === null || typeof value !== "object") {
        return `<div class="json-leaf">${key}: <span class="json-primitive">${escapeHtml(JSON.stringify(value))}</span></div>`;
      }

      const entries = Array.isArray(value) ? value.map((item, index) => [index, item]) : Object.entries(value);
      const type = Array.isArray(value) ? `Array(${value.length})` : `Object(${entries.length})`;
      const children = entries.map(([childLabel, childValue]) => jsonTree(childValue, childLabel, depth + 1)).join("");
      const open = depth < 2 ? " open" : "";
      return `<details${open}><summary>${key}: ${type}</summary>${children}</details>`;
    }

    function setViewerData(data, manifestRecord, label) {
      const viewRecord = summarizeData(data, manifestRecord);
      const ideals = primaryIdealsFromData(data);
      const geometricCards = ideals
        .map((ideal, index) => ({ ideal, index: index + 1, geometric: parseGeometricIndices(ideal.GeometricComponent).length > 0 }))
        .filter(item => item.geometric)
        .map(item => idealSummaryCard(item.ideal, item.index));
      const allCards = ideals.map((ideal, index) => idealSummaryCard(ideal, index + 1));
      const rawJson = JSON.stringify(data, null, 2);
      const differenceNotice = solutionDifferenceNotice(viewRecord, manifestRecord, label);

      viewerBody.innerHTML = `
        <div class="viewer-content">
          <div class="viewer-tabs" role="tablist" aria-label="JSON viewer sections">
            <button class="viewer-tab" type="button" data-panel="summary" aria-selected="true">Summary</button>
            <button class="viewer-tab" type="button" data-panel="ideals" aria-selected="false">Ideals</button>
            <button class="viewer-tab" type="button" data-panel="determinant" aria-selected="false">Determinant</button>
            <button class="viewer-tab" type="button" data-panel="tree" aria-selected="false">Tree</button>
            <button class="viewer-tab" type="button" data-panel="raw" aria-selected="false">Raw JSON</button>
          </div>
          <section class="viewer-panel" data-panel="summary">
            ${manifestSummaryTable(viewRecord)}
            ${differenceNotice}
            <div class="viewer-grid">
              ${viewerFact("Index", data.Index)}
              ${viewerFact("Name", data.Name || data.RolfsenName)}
              ${viewerFact("Hyperbolic", boolText(data.Hyperbolic))}
              ${viewerFact("Torus", boolText(data.Torus))}
              ${viewerFact("Satellite", boolText(data.Satellite))}
              ${viewerFact("Primary ideals", ideals.length)}
            </div>
            <div class="viewer-section-title">Geometric ideal${geometricCards.length === 1 ? "" : "s"}</div>
            <div class="viewer-list">${geometricCards.length ? geometricCards.join("") : '<span class="muted">-</span>'}</div>
          </section>
          <section class="viewer-panel" data-panel="ideals" hidden>
            <div class="viewer-list">${allCards.length ? allCards.join("") : '<span class="muted">No primary ideals found.</span>'}</div>
          </section>
          <section class="viewer-panel" data-panel="determinant" hidden>
            <label class="viewer-check">
              <input type="checkbox" data-determinant-toggle checked>
              Show determinant comparison
            </label>
            <div class="determinant-block">${determinantComparison(viewRecord)}</div>
          </section>
          <section class="viewer-panel" data-panel="tree" hidden>
            <div class="json-tree">${jsonTree(data)}</div>
          </section>
          <section class="viewer-panel" data-panel="raw" hidden>
            <pre id="json-output"></pre>
          </section>
        </div>
      `;
      viewerBody.querySelector("#json-output").textContent = rawJson;
    }

    function selectViewerPanel(panelName) {
      viewerBody.querySelectorAll(".viewer-tab").forEach(tab => {
        tab.setAttribute("aria-selected", String(tab.dataset.panel === panelName));
      });
      viewerBody.querySelectorAll(".viewer-panel").forEach(panel => {
        panel.hidden = panel.dataset.panel !== panelName;
      });
    }

    async function viewJson(url, title, button, record, label) {
      placeViewerNear(button);
      viewerTitle.textContent = title;
      setViewerPre("Loading...");
      viewer.scrollIntoView({ behavior: "smooth", block: "nearest" });

      try {
        if (!jsonCache.has(url)) {
          const response = await fetch(url, { cache: "force-cache" });
          if (!response.ok) {
            throw new Error(`${response.status} ${response.statusText}`);
          }
          jsonCache.set(url, await response.json());
        }
        setViewerData(jsonCache.get(url), record, label);
      } catch (error) {
        const fallbackUrl = button.dataset.viewFallbackUrl || url;
        setEmbeddedViewer(
          fallbackUrl,
          record,
          label,
          `Could not parse this JSON inside the page (${error.message}). Showing the JSON object directly instead.`
        );
      }
    }

    function diagramPopup(url) {
      const img = new Image();
      img.src = url;
      img.addEventListener("load", function() {
        const zoom = 3;
        const winWidth = parseInt(zoom * this.naturalWidth);
        const winHeight = parseInt(zoom * this.naturalHeight);
        const popup = window.open("", "_blank", `width=${winWidth}, height=${winHeight}, scrollbars=auto`);
        popup.document.write(`<style>body{margin:0px;}</style><a href="#" onclick="window.close()" onfocus="this.blur()"><img src="${url}" width="${this.naturalWidth}" height="${this.naturalHeight}"></a>`);
        popup.document.body.style.zoom = `${zoom}00%`;
      });
      return false;
    }

    async function init() {
      const response = await fetch(MANIFEST_URL);
      records = await response.json();

      const crossings = Array.from(new Set(records.map(record => record.crossing))).sort((a, b) => a - b);
      crossingFilter.insertAdjacentHTML("beforeend", crossings.map(crossing => (
        `<option value="${crossing}">${crossing} crossings</option>`
      )).join(""));

      filtered = records;
      render();
    }

    searchInput.addEventListener("input", applyFilters);
    crossingFilter.addEventListener("change", applyFilters);
    hyperbolicFilter.addEventListener("change", applyFilters);
    dimensionFilter.addEventListener("change", applyFilters);
    pageSizeSelect.addEventListener("change", () => {
      page = 1;
      render();
    });
    prevPage.addEventListener("click", () => {
      page -= 1;
      render();
    });
    nextPage.addEventListener("click", () => {
      page += 1;
      render();
    });
    tbody.addEventListener("click", event => {
      const button = event.target.closest("button[data-view-url]");
      if (button) {
        viewJson(
          button.dataset.viewUrl,
          button.dataset.viewTitle,
          button,
          recordByIndex(button.dataset.recordIndex),
          button.dataset.viewLabel || "Selected"
        );
      }
    });
    viewerBody.addEventListener("click", event => {
      const tab = event.target.closest(".viewer-tab");
      if (tab) {
        selectViewerPanel(tab.dataset.panel);
      }
    });
    viewerBody.addEventListener("change", event => {
      const toggle = event.target.closest("[data-determinant-toggle]");
      if (toggle) {
        const block = viewerBody.querySelector(".determinant-block");
        if (block) {
          block.hidden = !toggle.checked;
        }
      }
    });
    document.getElementById("close-viewer").addEventListener("click", () => {
      viewer.hidden = true;
      const oldRow = document.getElementById("viewer-row");
      if (oldRow) {
        oldRow.remove();
      }
    });

    init().catch(error => {
      resultCount.textContent = "Could not load knot data.";
      tbody.innerHTML = `<tr><td colspan="8" class="empty">${escapeHtml(error.message)}</td></tr>`;
    });
  </script>
</body>
</html>
