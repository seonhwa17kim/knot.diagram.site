name: Deploy knot.diagram.site

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: knot-diagram-site-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare Pages upload directory
        run: |
          deploy_dir="$RUNNER_TEMP/pages-deploy"
          mkdir -p "$deploy_dir"
          rsync -a --delete \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="reports" \
            ./ "$deploy_dir"/

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ${{ runner.temp }}/pages-deploy --project-name=knot-diagram-site --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
